<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="15" fill="#000" />
  <g stroke="#fff" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Book Outer Cover -->
    <path d="M 20 25 C 32 25 42 30 50 35 C 58 30 68 25 80 25 V 65 C 68 65 58 70 50 80 C 42 70 32 65 20 65 Z" />
    <!-- Book Inner Cover Line -->
    <path d="M 20 65 V 75 C 32 75 42 80 50 90 C 58 80 68 75 80 75 V 65" />
    <!-- Book Spine -->
    <path d="M 50 35 V 90" stroke-width="4" />

    <!-- Git Graph Nodes & Branches -->
    <g fill="#fff" stroke="#fff" stroke-width="4">
      <!-- Root Node (Center) -->
      <circle cx="50" cy="55" r="3" stroke="none" />
      
      <!-- Branch sweeping up & right -->
      <path d="M 50 55 L 70 42 V 28" fill="none" />
      <circle cx="70" cy="28" r="3" stroke="none" />

      <!-- Sub-branch right side -->
      <path d="M 60 48 V 28" fill="none" />
      <circle cx="60" cy="28" r="3" stroke="none" />

      <!-- Branch sweeping down & right -->
      <path d="M 50 55 C 60 62 65 62 72 68" fill="none" />

      <!-- Branch sweeping up & left -->
      <path d="M 50 55 C 35 60 28 45 28 28" fill="none" />
      <circle cx="28" cy="28" r="3" stroke="none" />

      <!-- Sub-branch sweeping down & left -->
      <path d="M 28 40 C 28 60 38 60 42 63" fill="none" />
      <circle cx="44" cy="65" r="3" stroke="none" />
    </g>
  </g>
</svg>
